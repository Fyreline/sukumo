# Deploys apps/web to GitHub Pages on every push to master
# (docs/DEPLOYMENT.md §1). The API stays on the household machine behind the
# Cloudflare Tunnel; the repo variable VITE_API_BASE points the deployed SPA
# at it — without the variable the build falls back to localhost:8301 and only
# works on a machine running the API locally.
name: deploy-pages

on:
  push:
    branches: [master]
    paths: ['apps/web/**', '.github/workflows/deploy-pages.yml']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
        working-directory: apps/web
      - run: npm run typecheck
        working-directory: apps/web
      - run: npm run build
        working-directory: apps/web
        env:
          VITE_BASE: /sukumo/
          VITE_API_BASE: ${{ vars.VITE_API_BASE || 'http://127.0.0.1:8301' }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
