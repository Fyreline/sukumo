<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- %BASE_URL%-prefixed (Vite HTML env replacement) so these resolve on
         both / (dev) and /sukumo/ (GitHub Pages project site) — the absolute
         /icons/… form 404'd in prod, and iOS fell back to a flat screenshot
         tile for the home-screen icon. Same pattern as Kakeibo's index.html. -->
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%icons/icon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="%BASE_URL%icons/apple-touch-icon.png" />
    <link rel="manifest" href="%BASE_URL%manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f7fbfa" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f1d2b" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Sukumo" />
    <title>Sukumo</title>
    <script>
      // Apply the theme class before first paint to avoid a flash of the
      // wrong theme. Mirrors src/components/ThemeToggle.tsx: explicit
      // localStorage choice wins, otherwise fall back to the OS
      // `prefers-color-scheme` on first visit.
      (function () {
        try {
          var stored = localStorage.getItem('sukumo-theme');
          var dark = stored ? stored === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
          document.documentElement.classList.toggle('dark', dark);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
